<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>HTML5 Banner</title>

<style>
  body {
    margin: 0;
  }

  .banner {
    width: 300px;
    height: 250px;
    background: linear-gradient(135deg, #000, #333);
    color: white;
    font-family: Arial, sans-serif;
    position: relative;
    overflow: hidden;
    cursor: pointer;
  }

  .frame {
    position: absolute;
    width: 100%;
    text-align: center;
    top: 80px;
    opacity: 0;
    transition: all 0.8s ease;
  }

  .frame.active {
    opacity: 1;
    top: 60px;
  }

  .logo {
    position: absolute;
    top: 15px;
    left: 15px;
    font-size: 14px;
    opacity: 0.8;
  }

  .cta {
    position: absolute;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: red;
    padding: 10px 20px;
    font-weight: bold;
    transition: transform 0.3s, background 0.3s;
  }

  .cta:hover {
    transform: translateX(-50%) scale(1.1);
    background: #ff4444;
  }

</style>
</head>

<body>

<div class="banner" id="banner">

  <div class="logo">Vodafone</div>

  <div id="frame1" class="frame active">
    Nuova collezione
  </div>

  <div id="frame2" class="frame">
    Solo per pochi giorni
  </div>

  <div id="frame3" class="frame">
    Fino al -50%
  </div>

  <div class="cta">Scopri ora</div>

</div>

<script>
  // clickTag (standard advertising)
  const clickTag = "https://www.google.com";

  document.getElementById("banner").addEventListener("click", function () {
    window.open(clickTag, "_blank");
  });

  // sequenza animazioni
  const frames = [
    document.getElementById("frame1"),
    document.getElementById("frame2"),
    document.getElementById("frame3")
  ];

  let current = 0;

  function showNextFrame() {
    frames[current].classList.remove("active");
    current = (current + 1) % frames.length;
    frames[current].classList.add("active");
  }

  setInterval(showNextFrame, 2000);

</script>

</body>
</html>
