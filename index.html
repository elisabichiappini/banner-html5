<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      margin: 0;
    }

    .banner {
      width: 300px;
      height: 250px;
      background: #111;
      color: white;
      font-family: Arial;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    .text {
      opacity: 0;
      position: absolute;
      transition: opacity 1s;
    }

    .text.active {
      opacity: 1;
    }

    .cta {
      position: absolute;
      bottom: 20px;
      background: red;
      padding: 10px;
      cursor: pointer;
    }
  </style>
</head>
<body>

<div class="banner">
  <div id="text1" class="text active">Nuova collezione</div>
  <div id="text2" class="text">Scopri ora</div>
  <div class="cta">Shop</div>
</div>

<script>
  setTimeout(() => {
    document.getElementById("text1").classList.remove("active");
    document.getElementById("text2").classList.add("active");
  }, 2000);
</script>

</body>
</html>
